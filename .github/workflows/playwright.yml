name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: test-step
        run: npx playwright test --reporter=html,json
        continue-on-error: true

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: old-reports
          fetch-depth: 0
        continue-on-error: true

      - name: Prepare results
        if: always()
        run: |
          mkdir -p Results

          if [ -d "old-reports" ]; then
            cp -r old-reports/Run-* Results/ 2>/dev/null || true
          fi

          RUN_DIR="Results/Run-${{ github.run_number }}"
          mkdir -p "$RUN_DIR"

          cp -r playwright-report/* "$RUN_DIR/" || true

          date '+%d-%m-%Y %I:%M%p' > "$RUN_DIR/timestamp.txt"

          if [ "${{ steps.test-step.outcome }}" == "success" ]; then
            echo passed > "$RUN_DIR/status.txt"
          else
            echo failed > "$RUN_DIR/status.txt"
          fi

          echo "${{ github.run_number }}" > Results/latest.txt

          cd Results

          ls -d Run-* 2>/dev/null | sed 's/Run-//' | sort -n | head -n -10 | while read num; do
            rm -rf "Run-$num"
          done

          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
          <title>Playwright Reports</title>
          <style>
          body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:40px;margin:0}
          .container{max-width:900px;margin:auto}
          h1{color:white}
          .report{background:white;border-radius:10px;padding:18px;margin:12px 0;text-decoration:none;display:flex;justify-content:space-between;color:#333}
          .badge{padding:4px 10px;border-radius:10px;color:white;font-size:.8em}
          .pass{background:#10b981}
          .fail{background:#ef4444}
          </style>
          </head>
          <body>
          <div class="container">
          <h1>🧪 Playwright Test Reports</h1>
          <ul style="list-style:none;padding:0;">
          EOF

          ls -d Run-* 2>/dev/null | sed 's/Run-//' | sort -rn | while read num; do
            dir="Run-$num"

            timestamp=""
            status=""

            [ -f "$dir/timestamp.txt" ] && timestamp=$(cat "$dir/timestamp.txt")
            [ -f "$dir/status.txt" ] && status=$(cat "$dir/status.txt")

            badge=""
            if [ "$status" = "passed" ]; then
              badge="<span class='badge pass'>Passed</span>"
            elif [ "$status" = "failed" ]; then
              badge="<span class='badge fail'>Failed</span>"
            fi

            echo "<li>
            <a class='report' href='$dir/index.html'>
            <div><strong>Run #$num</strong> $badge<div>$timestamp</div></div>
            <div>→</div>
            </a>
            </li>" >> index.html
          done

          cat >> index.html << 'EOF'
          </ul>
          </div>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: Results
          publish_branch: gh-pages
